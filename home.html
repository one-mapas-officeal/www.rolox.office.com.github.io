<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel | ROLOX - Global Innovation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap');
        
        body { background: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: auto; background: #0f0f0f; padding: 30px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .status-box { background: #1a1a1a; padding: 15px; margin: 20px 0; border-left: 4px solid #ff3333; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161616; padding: 15px; border: 1px solid #222; text-align: center; }
        .footer { margin-top: 40px; font-size: 0.7em; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>ROLOX <span style="color:#ff3333">PORTAL</span></h1>
        <div id="user-display">Carregando...</div>
    </div>

    <div id="network-status" class="status-box">Verificando status da rede...</div>

    <h2>Jogos Disponíveis</h2>
    <div class="game-grid">
        <div class="card">Jogo de Teste 1</div>
        <div class="card">Mundo Global</div>
    </div>

    <div class="footer">
        ROLOX STUDIO: LANÇAMENTO OFICIAL 01/01/2028 | Sistema de Monitoramento Ativo
    </div>
</div>

<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    
    // Captura os dados
    const user = params.get('username');
    const isBeta = params.get('beta');
    const ticks = params.get('ticks');
    
    // Atualiza o Display
    document.getElementById('user-display').innerHTML = `Logado: <strong>${user}</strong>`;

    // Lógica de Rede (Conforme o bug que você mencionou)
    const netStatus = document.getElementById('network-status');
    if (ticks === 'error') {
        netStatus.innerHTML = "⚠️ <strong>Aviso:</strong> Instabilidade detectada na rede local. A conexão direta pode causar travamentos.";
        netStatus.style.borderLeftColor = "#ffcc00";
    } else {
        netStatus.innerHTML = "✅ Sistema online e estável.";
        netStatus.style.borderLeftColor = "#0f0";
    }
};
</script>

</body>
</html>
